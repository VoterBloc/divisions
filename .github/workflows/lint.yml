name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run tests
        run: pytest

      - name: Lint YAML data
        run: divisions lint

      - name: Verify committed JSON schema is up to date
        run: |
          divisions schema --out /tmp/regen.json
          diff -q schema/division.schema.json /tmp/regen.json
