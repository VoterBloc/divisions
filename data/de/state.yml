    note: Title 15 § 4937 — primary-source voting-procedure statute (non-photo ID or affidavit)
  - url: https://ballotpedia.org/Voting_in_Delaware
    note: comprehensive DE voting policy summary — excuse-required mail-in (Art V § 4A); in-person early voting restored by DE Supreme Court June 2024; 24-day registration deadline
