id: ocd-division/country:us/state:al
name: Alabama
type: state

abbreviation: AL
iso_3166_2: US-AL
capital: Montgomery
motto: Audemus jura nostra defendere        # "We dare defend our rights"

established: 1819-12-14                      # date of statehood
website: https://www.alabama.gov/
timezone: America/Chicago

governance:
  upper_chamber: Senate
  lower_chamber: House of Representatives
  seats: 140                                 # 35 Senate + 105 House
  is_unicameral: false
  partisan: true
  has_term_limits: false                     # AL state legislators have no term limits
  elected_offices:
    attorney_general: true
    secretary_of_state: true
    treasurer: true
    agriculture_commissioner: true           # Commissioner of Agriculture and Industries
  executive:
    has_lt_governor: true
    lt_gov_joint_ticket: false                # separately elected

direct_democracy:
  citizen_initiative: false                  # AL does not permit citizen-initiated statutes
  citizen_referendum: false
  recall: false                              # no recall of state elected officials

elections_policy:
  runoff: true                               # AL holds primary runoffs when no candidate wins a majority
  ranked_choice: false
  primary_type: open                         # AL does not register voters by party (EAC form: "Alabama voters do not register by political party affiliation")
  vote_by_mail: excuse-required              # NCSL Table 2 — AL requires an excuse (Ala. Code § 17-11-3)
  early_voting: false                        # AL has no in-person early voting (US Vote Foundation)

voter_registration:
  automatic: false                           # AL does not have AVR
  online: true                               # via AL Secretary of State
  same_day: false                            # AL does not have SDR/EDR
  min_age: 18
  registration_deadline_days: 15             # per EAC form: postmarked or delivered by the 15th day before election
  voter_id_requirement: photo                # photo ID required; non-strict — two election officials may attest to voter identity (Ala. Code § 17-10-1)
  felon_restoration: application_required    # moral-turpitude felonies require restoration of civil & political rights

elections:
  office_name: Alabama Secretary of State - Elections Division
  office_url: https://www.sos.alabama.gov/alabama-votes
  office_phone: 1-800-274-8683
  office_address: |
    Office of the Secretary of State
    Elections Division
    P.O. Box 5616
    Montgomery, AL 36103-5616

civic_urls:
  register_to_vote: https://www.alabamainteractive.org/sos/voter_registration/voterRegistrationWelcome.action
  register_by_mail: https://www.sos.alabama.gov/contact/online_voter_form_request
  check_registration: https://myinfo.alabamavotes.gov/VoterView
  find_polling_place: https://myinfo.alabamavotes.gov/VoterView
  request_absentee_ballot: https://www.sos.alabama.gov/alabama-votes/voter/absentee-voting
  track_ballot: https://myinfo.alabamavotes.gov/VoterView
  sample_ballot: https://www.sos.alabama.gov/alabama-votes/2026-primary-election-sample-ballots
  voter_id_info: https://www.sos.alabama.gov/alabama-votes/photo-voter-id/valid-ids
  elections_calendar: https://www.sos.alabama.gov/alabama-votes/voter/election-information/2026
  military_overseas_voting: https://www.sos.alabama.gov/alabama-votes/voter/military-overseas-voting

