id: ocd-division/country:us/state:ca
name: California
type: state

abbreviation: CA
iso_3166_2: US-CA
capital: Sacramento
demonym: Californian
nicknames:
  - Golden State
motto: Eureka

established: 1850-09-09
website: https://www.ca.gov
timezone: America/Los_Angeles

governance:
  upper_chamber: Senate
  lower_chamber: Assembly
  seats: 120               # 40 Senate + 80 Assembly
  is_unicameral: false
  partisan: true
  has_term_limits: true    # Prop 28 (2012): 12 cumulative years total
  term_limit: 12
  executive:
    has_lt_governor: true
    lt_gov_joint_ticket: false   # CA: separately elected
  elected_offices:
    attorney_general: true
    secretary_of_state: true
    treasurer: true
    controller: true
    insurance_commissioner: true
    superintendent_of_public_instruction: true
    board_of_equalization: true

direct_democracy:
  citizen_initiative: true
  citizen_referendum: true
  recall: true

elections_policy:
  runoff: false            # CA uses top-two open primary; no traditional runoff
  primary_type: top-two    # Prop 14 (2010): all candidates on one primary ballot, top 2 advance
  vote_by_mail: universal  # every active registered voter is automatically mailed a ballot (AB 37, 2021, permanent)
  early_voting: true
  ranked_choice: false     # CA does not use RCV in state-level elections (some CA cities do locally)

voter_registration:
  automatic: true          # AB 1461 (2015) — DMV-triggered AVR
  online: true
  same_day: true           # conditional voter registration (through Election Day)
  min_age: 18
  pre_registration_age: 16 # AB 1817 (2014)
  registration_deadline_days: 15            # standard deadline; CVR available up to and including Election Day
  voter_id_requirement: none                # CA does not require ID to vote except as mandated by HAVA for first-time voters who registered by mail
  felon_restoration: automatic_upon_release # Prop 17 (2020) — restored on release from prison

elections:
  office_name: California Secretary of State - Elections Division
  office_url: https://www.sos.ca.gov/elections
  office_phone: 1-800-345-8683              # 1-800-345-VOTE (CA SOS voter hotline)
  office_address: |
    Secretary of State
    Elections Division
    1500 11th Street, 5th Floor
    Sacramento, CA 95814

civic_urls:
  register_to_vote: https://registertovote.ca.gov/
  check_registration: https://voterstatus.sos.ca.gov/
  find_polling_place: https://www.sos.ca.gov/elections/polling-place
  request_absentee_ballot: https://www.sos.ca.gov/elections/voter-registration/vote-mail
  track_ballot: https://www.sos.ca.gov/elections/ballot-status/wheres-my-ballot
  sample_ballot: https://voterguide.sos.ca.gov/
  voter_id_info: https://ballotpedia.org/Voter_ID_in_California
  elections_calendar: https://www.sos.ca.gov/elections/upcoming-elections

ids:
  wikidata: Q99
  wikipedia: California
  ballotpedia: California
  census_geoid: "04000US06"
  fips_state: "06"
  osm_relation: "165475"

links:
