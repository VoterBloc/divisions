    note: registration policy, voter ID, felon restoration, primary type
  - url: https://www.pa.gov/agencies/vote/voter-registration/voter-registration-requirements
    note: PA Department of State — 15-day deadline, 17-year-old pre-registration
  - url: https://ballotpedia.org/Laws_governing_recall_in_Pennsylvania
    note: PA does not allow recall of any elected officials, state or local
  - url: https://ballotpedia.org/Primary_elections_in_Pennsylvania
    note: closed primary; Independents excluded from major-party primaries
