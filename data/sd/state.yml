    note: registration policy, voter ID, primary type, felon restoration
  - url: https://sdsos.gov/elections-voting/voting/register-to-vote/default.aspx
    note: SD SoS — 15-day deadline; paper-only registration (no OVR)
  - url: https://ballotpedia.org/Laws_governing_recall_in_South_Dakota
    note: no recall of state officials; municipal recall available
  - url: https://ballotpedia.org/Primary_elections_in_South_Dakota
    note: party-discretion primary; GOP closed, Dem semi-closed (Independents allowed)
