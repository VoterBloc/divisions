    note: registration policy, voter ID, primary type, felon restoration
  - url: https://scvotes.gov/voters/register-to-vote/
    note: SC State Election Commission — 30-day deadline, 17-year-old pre-registration, online registration
  - url: https://ballotpedia.org/Primary_elections_in_South_Carolina
    note: open primary; no party registration
  - url: https://ballotpedia.org/Recall_campaigns_in_South_Carolina
    note: SC has no recall provisions; legislative proposals to add recall have not been enacted
