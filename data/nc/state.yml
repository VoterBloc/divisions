  - url: https://www.ncsbe.gov/registering/how-register/voter-registration-deadlines
    note: NC SBOE — 25-day civilian registration deadline; same-day registration during early voting
  - url: https://www.ncsbe.gov/registering/who-can-register/preregistering-vote-when-you-are-16-or-17-years-old
    note: NC SBOE — pre-registration for 16- and 17-year-olds
  - url: https://ballotpedia.org/Laws_governing_recall_in_North_Carolina
    note: no statewide recall; ~25 municipalities have local recall by special act
