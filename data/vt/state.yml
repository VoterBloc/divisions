    note: registration policy, voter ID, primary type, felon retention of rights
  - url: https://sos.vermont.gov/elections/voters/registration
    note: VT SoS — no fixed deadline (EDR), pre-registration before 18, online registration
  - url: https://ballotpedia.org/Primary_elections_in_Vermont
    note: open primary; nonpartisan voter rolls
  - url: https://ballotpedia.org/Laws_governing_recall_in_Vermont
    note: no statewide recall; ~16 towns have charter recall
