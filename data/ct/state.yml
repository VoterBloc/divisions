id: ocd-division/country:us/state:ct
name: Connecticut
type: state

abbreviation: CT
iso_3166_2: US-CT
capital: Hartford
motto: Qui transtulit sustinet               # "He who transplanted still sustains"

established: 1788-01-09                      # 5th state to ratify the U.S. Constitution
website: https://portal.ct.gov/
timezone: America/New_York

governance:
  upper_chamber: Senate
  lower_chamber: House of Representatives
  is_unicameral: false
  partisan: true
  has_term_limits: false                     # CT has no legislative term limits
  elected_offices:
    attorney_general: true
    secretary_of_state: true                 # formally "Secretary of the State"
    treasurer: true
    comptroller: true                        # CT has an elected State Comptroller
  executive:
    has_lt_governor: true

direct_democracy:
  citizen_initiative: false                  # CT does not permit citizen initiative
  citizen_referendum: false
  recall: false                              # CT does not permit recall of state officials

elections_policy:
  runoff: false                              # plurality general elections
  ranked_choice: false
  primary_type: closed                       # per EAC form: must register with a party to vote in that party's primary
  vote_by_mail: excuse-required              # NCSL Table 2 — CT traditionally required an excuse; 2024 constitutional amendment authorized no-excuse but implementation varies by election type
  early_voting: true                         # CT approved in-person early voting via 2022 constitutional amendment; first used in 2024

voter_registration:
  online: true                               # CT SOTS online voter registration
  same_day: true                             # Election Day Registration available
  min_age: 18
  pre_registration_age: 17                   # per EAC form — 17-year-olds who turn 18 by Election Day may participate in general primaries
  registration_deadline_days: 18             # postmarked 18 days before election/primary (EAC form)
  voter_id_requirement: non_photo            # Ballotpedia — non-photo ID required; affidavit alternative exists
  felon_restoration: automatic_upon_release  # CT Public Act 21-32 (2021) — rights restored upon release from prison

elections:
  office_name: Connecticut Secretary of the State - Elections Division
  office_url: https://portal.ct.gov/sots/common-elements/v5-template---redesign/elections--voting--home-page
  office_phone: 1-866-733-2463                # CT Election Day Hotline
  office_email: elections@ct.gov
  office_address: |
    Secretary of the State of Connecticut
    Elections Division
    P.O. Box 150470
    Hartford, CT 06115-0470

civic_urls:
  register_to_vote: https://voterregistration.ct.gov/
  register_by_mail: https://portal.ct.gov/sots/election-services/register-to-vote/voter-registration-application-english-and-spanish
  check_registration: https://portaldir.ct.gov/sots/lookup.aspx
  find_polling_place: https://portal.ct.gov/sots/election-services/voter-information/where-and-how-do-i-vote
  request_absentee_ballot: https://oabr-sots.ct.gov/OABR/absenteeBallotReqPortalHome.do
  track_ballot: https://portaldir.ct.gov/sots/lookup.aspx
  sample_ballot: https://portal.ct.gov/sots/election-services/town-ballots/ballots
  voter_id_info: https://portal.ct.gov/sots/election-services/faq/faq---voter-identification
  elections_calendar: https://portal.ct.gov/SOTS/Election-Services/Calendars/Election-Calendars
  military_overseas_voting: https://portal.ct.gov/sots/election-services/voter-information/military-and-overseas-voters

