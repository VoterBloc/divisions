id: ocd-division/country:us/state:az
name: Arizona
type: state

abbreviation: AZ
iso_3166_2: US-AZ
capital: Phoenix
demonym: Arizonan
motto: Ditat Deus                            # "God enriches"

established: 1912-02-14                      # date of statehood (48th state)
website: https://az.gov/
timezone: America/Phoenix                    # AZ does NOT observe DST (except the Navajo Nation)

governance:
  upper_chamber: Senate
  lower_chamber: House of Representatives
  seats: 90                                  # 30 Senate + 60 House (2 reps per district)
  term_years: 2
  is_unicameral: false
  partisan: true
  has_term_limits: true                      # Prop 107 (1992): 8 consecutive years per chamber
  term_limit: 8
  elected_offices:
    attorney_general: true
    secretary_of_state: true                 # also next in line for the governorship
    treasurer: true
    superintendent_of_public_instruction: true
    mine_inspector: true                     # unique AZ elected office
    corporation_commissioner: true           # 5-member elected body (utilities etc.)
  executive:
    has_lt_governor: false                   # Arizona has no LG; SOS is first in succession

direct_democracy:
  citizen_initiative: true
  citizen_referendum: true
  recall: true                               # used most famously in 2011 against state senators

elections_policy:
  runoff: false                              # plurality general elections
  ranked_choice: false
  primary_type: semi-closed                  # partisans vote their own party's primary; independents/unaffiliated may pick one party's ballot (EAC form)
  vote_by_mail: no-excuse                    # any AZ voter may vote early by mail; Active Early Voting List auto-mails ballots
  early_voting: true                         # ~27 days of in-person early voting

voter_registration:
  automatic: false                           # no AVR — AZ uses classic NVRA Motor Voter, not opt-out enrollment
  online: true                               # via ServiceArizona / AZ SOS
  same_day: false
  min_age: 18
  registration_deadline_days: 29             # per EAC form
  voter_id_requirement: non_photo            # Ballotpedia — photo or two forms of non-photo ID accepted
  felon_restoration: upon_completion         # rights restored automatically on completion of first felony sentence; application required for 2nd+

elections:
  office_name: Arizona Secretary of State - Elections Services Division
  office_url: https://azsos.gov/elections
  office_phone: 1-877-843-8683                # 1-877-THE-VOTE
  office_address: |
    Arizona Secretary of State / Elections
    1700 W. Washington, 7th Floor
    Phoenix, AZ 85007-2888

civic_urls:
  register_to_vote: https://azmvdnow.gov/guest/customeranonymous/voterregistration
  register_by_mail: https://azsos.gov/sites/default/files/voter_registration_form_092222-standard.pdf
  check_registration: https://my.arizona.vote/WhereToVote.aspx?s=individual&language=en
  find_polling_place: https://my.arizona.vote/WhereToVote.aspx?s=address&language=en
  request_absentee_ballot: https://azsos.gov/elections/voters/early-voting   # same URL covers Active Early Voting List (AEVL) sign-up
  track_ballot: https://www.azcleanelections.gov/election-and-ballot-tracking

ids:
  wikidata: Q816
  wikipedia: Arizona
  ballotpedia: Arizona
  fips_state: "04"
  census_geoid: "04000US04"
  osm_relation: "162018"

links:
  - url: https://azsos.gov/elections/voters/registering-vote
    note: AZ SOS voter registration hub — explains OVR + paper options
  - url: https://azsos.gov/webform/contact?department=1005
    note: AZ SOS Elections contact webform

sources:
  - url: https://en.wikipedia.org/wiki/Arizona
    note: general reference
  - url: https://www.eac.gov/sites/default/files/eac_assets/1/6/Federal_Voter_Registration_ENG.pdf
    note: EAC National Mail Voter Registration Form (OMB 3265-0015) — 29-day deadline; semi-closed primary; SOS mailing address
  - url: https://ballotpedia.org/Voter_ID_in_Arizona
    note: non-photo ID required; two forms of non-photo ID accepted as alternative
  - url: https://azsos.gov/elections/voters/registering-vote
    note: AZ SOS — online voter registration; no AVR
  - url: https://ballotpedia.org/Voting_in_Arizona
    note: no AVR; no same-day registration; online registration available
  - url: https://ballotpedia.org/Arizona_Proposition_107,_Term_Limits_Amendment_(1992)
    note: legislative term limits — 8 consecutive years per chamber
  - url: https://ballotpedia.org/Laws_governing_the_initiative_process_in_Arizona
    note: citizen initiative permitted
  - url: https://ballotpedia.org/Laws_governing_ballot_measures_in_Arizona
    note: citizen referendum permitted
  - url: https://ballotpedia.org/Laws_governing_recall_in_Arizona
    note: recall of state elected officials permitted
  - url: https://ballotpedia.org/Line_of_succession_for_Governor_of_Arizona
    note: no Lt. Governor; SOS is first in line for the governorship
  - url: https://ballotpedia.org/Arizona_State_Mine_Inspector
    note: elected State Mine Inspector (unique to Arizona)
  - url: https://ballotpedia.org/Arizona_Corporation_Commission
    note: elected 5-member Corporation Commission
