    note: registration policy, voter ID, primary type, AVR, felon restoration
  - url: https://vote.sos.ri.gov/Voter/RegisterToVote
    note: RI SoS — 30-day deadline, 16-year-old pre-registration
  - url: https://ballotpedia.org/Laws_governing_recall_in_Rhode_Island
    note: limited recall via RI Const. Art. IV §1; statewide officers only, on enumerated grounds
  - url: https://ballotpedia.org/Primary_elections_in_Rhode_Island
    note: semi-closed primary; unaffiliated voters retain unaffiliated status
