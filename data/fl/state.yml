  find_polling_place: https://dos.fl.gov/elections/for-voters/check-your-voter-status-and-polling-place/voter-precinct-lookup/
  request_absentee_ballot: https://dos.fl.gov/elections/for-voters/voting/vote-by-mail/
  track_ballot: https://dos.fl.gov/elections/for-voters/check-your-voter-status-and-polling-place/vote-by-mail-ballot-information-and-status-lookup/
  sample_ballot: https://ballotpedia.org/Sample_Ballot_Lookup
  voter_id_info: https://ballotpedia.org/Voter_ID_in_Florida
  elections_calendar: https://dos.fl.gov/elections/for-voters/election-dates/

